version: "3.9"

# ============================================================
# Data Warehouse Pipeline - Docker Compose
# Spins up a PostgreSQL instance with pgvector pre-installed.
# ============================================================

services:
  db:
    image: pgvector/pgvector:pg16          # Official pgvector image on top of Postgres 16
    container_name: dw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datawarehouse}
      POSTGRES_USER: ${POSTGRES_USER:-dw_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dw_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data          # Persistent data volume
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Auto-executed on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dw_user} -d ${POSTGRES_DB:-datawarehouse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pg_data:
    driver: local
